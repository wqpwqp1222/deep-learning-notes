name: Publish Quarto Website

on:
  push:
    branches: [main]
    paths-ignore:
      - "assets/**"
      - "utils/**"
      - "_freeze/**"
      - "**/LICENSE.*"
      - "**/*.md"
      - "**/ruff.toml"
      - "**/.git*"
      - "**/.github/*.json"
      - "**/.github/workflows/dnnl-ci.yml"
      - "**/.github/workflows/manual-publish.yml"
      - "**/.github/workflows/package-notebooks.yml"
      - "**/.github/workflows/render-check.yml"
  workflow_dispatch:

env:
  DNNL_DATA_ROOT: ${{ github.workspace }}/datasets
  HF_HOME: ~/.cache/huggingface
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: publish-website
  cancel-in-progress: true

jobs:
  build-deploy:
    if: ${{ github.actor != 'github-actions[bot]' }}
    name: Build and Deploy Quarto Website
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Save repository freeze cache
        shell: bash
        run: |
          if [ -d _freeze ]; then
            rm -rf /tmp/repo_freeze
            mkdir -p /tmp/repo_freeze
            cp -a _freeze/. /tmp/repo_freeze/
          fi

      - name: Remove existing freeze cache
        run: rm -rf _freeze

      - name: Use Quarto freeze cache
        uses: actions/cache@v5
        with:
          path: _freeze
          key: quarto-freeze-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            quarto-freeze-${{ runner.os }}-

      - name: Overlay repository freeze cache
        shell: bash
        run: |
          if [ -d /tmp/repo_freeze ]; then
            mkdir -p _freeze
            cp -a /tmp/repo_freeze/. _freeze/
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            dnnl/pyproject.toml

      - name: Install Python dependencies
        run: |
          uv python install 3.14
          uv sync --python 3.14 --all-packages

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Mermaid CLI
        run: |
          npm init -y
          npm install @mermaid-js/mermaid-cli

      - name: Set Chrome path for Puppeteer
        if: runner.os == 'Linux'
        run: echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable" >> "$GITHUB_ENV"

      - name: Download datasets for notebooks
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$DNNL_DATA_ROOT/caltech101"
          uv run gdown 19qo4t_YR0RGILU_nmpXHbo1mMGOvn3iH \
            -O "$DNNL_DATA_ROOT/caltech101/caltech-101.zip"

          mkdir -p "$DNNL_DATA_ROOT/MNIST"
          uv run gdown 1Aph8a8r7_uFN-IsVu5oFmZ4_zJKckk4X \
            -O "$DNNL_DATA_ROOT/MNIST/mnist.zip"
          unzip -q "$DNNL_DATA_ROOT/MNIST/mnist.zip" -d "$DNNL_DATA_ROOT/MNIST"

          uv run python utils/download_datasets.py

      - name: Render site
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: quarto render --profile html

      - name: Commit back TOC changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add zh/README.md en/README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "MAINT: Update TOC for deep-learning-notes"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
