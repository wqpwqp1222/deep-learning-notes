name: Publish Quarto Website

on:
  push:
    branches: [main]
    paths-ignore:
      - "assets/**"
      - "**/LICENSE.*"
      - "**/*.md"
      - "**/ruff.toml"
      - "**/.git*"
      - "**/.github/*.json"
      - "**/.github/workflows/dnnl-ci.yml"
      - "**/.github/workflows/manual-publish.yml"
      - "**/.github/workflows/package-notebooks.yml"
      - "**/.github/workflows/render-check.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: publish-website
  cancel-in-progress: true

jobs:
  build-deploy:
    if: ${{ github.actor != 'github-actions[bot]' }}
    name: Build and Deploy Quarto Website
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv python install 3.14

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Commit back TOC changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add zh/README.md en/README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "MAINT: Update TOC for deep-learning-notes"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
