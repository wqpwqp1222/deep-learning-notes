name: Convert and Package Notebooks

on:
  schedule:
    - cron: "0 0 1 * *"
      timezone: "America/New_York"
  push:
    branches: [main]
    paths:
      - "zh/**"
      - "en/**"
      - ".github/workflows/package-notebooks.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: package-notebooks
  cancel-in-progress: true

jobs:
  package-zh:
    name: Package Chinese Notebooks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Mermaid CLI
        run: |
          npm init -y
          npm install @mermaid-js/mermaid-cli

      - name: Set Chrome path for Puppeteer
        if: runner.os == 'Linux'
        run: echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable" >> "$GITHUB_ENV"

      - name: Convert zh qmd to ipynb
        shell: bash
        run: quarto render zh/ --profile jupyter

      - name: Package zh notebooks
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "_jupyter/zh" ] && [ "$(find _jupyter/zh -type f | wc -l)" -gt 0 ]; then
            tar -czf dnnl-zh.tar.gz -C _jupyter zh
          fi

      - name: Generate zh package attestation
        if: ${{ hashFiles('dnnl-zh.tar.gz') != '' }}
        uses: actions/attest@v4
        with:
          subject-path: dnnl-zh.tar.gz

      - name: Upload zh artifact
        if: ${{ hashFiles('_jupyter/zh/**/*.ipynb') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: dnnl-zh
          path: dnnl-zh.tar.gz

  package-en:
    name: Package English Notebooks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Mermaid CLI
        run: |
          npm init -y
          npm install @mermaid-js/mermaid-cli

      - name: Set Chrome path for Puppeteer
        if: runner.os == 'Linux'
        run: echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable" >> "$GITHUB_ENV"

      - name: Convert en qmd to ipynb
        shell: bash
        run: quarto render en/ --profile jupyter

      - name: Package en notebooks
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "_jupyter/en" ] && [ "$(find _jupyter/en -type f | wc -l)" -gt 0 ]; then
            tar -czf dnnl-en.tar.gz -C _jupyter en
          fi

      - name: Generate en package attestation
        if: ${{ hashFiles('dnnl-en.tar.gz') != '' }}
        uses: actions/attest@v4
        with:
          subject-path: dnnl-en.tar.gz

      - name: Upload en artifact
        if: ${{ hashFiles('_jupyter/en/**/*.ipynb') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: dnnl-en
          path: dnnl-en.tar.gz
