name: Compile Notebooks and Render PDFs

on:
  push:
    branches: [main]
    paths:
      - "zh/**"
      - "en/**"
      - "refs-*.bib"
      - "_quarto.yml"
      - "_quarto-typst-*.yml"
      - "utils/render_mermaid.py"
      - "utils/clean_mermaid_svg.py"
      - "utils/rename_pdf.py"
      - "utils/typst-header-*.typ"
      - ".github/workflows/render-pdf.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: pdf-rendering
  cancel-in-progress: true

jobs:
  render-zh-pdf:
    name: Typst PDF Rendering for Chinese Notebooks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install PDF fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-jetbrains-mono fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -fv
          fc-list | grep -i "JetBrains Mono" | head || true
          fc-list | grep -i "Noto Serif CJK" | head || true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Mermaid CLI
        run: |
          npm init -y
          npm install @mermaid-js/mermaid-cli

      - name: Set Chrome path for Puppeteer
        if: runner.os == 'Linux'
        run: echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable" >> "$GITHUB_ENV"

      - name: Compile zh qmd to pdf
        shell: bash
        run: quarto render --profile typst-zh

      - name: Generate zh PDF attestation
        if: ${{ hashFiles('_typst/deep-learning-notes-zh.pdf') != '' }}
        uses: actions/attest@v4
        with:
          subject-path: _typst/deep-learning-notes-zh.pdf

      - name: Upload zh artifact
        if: ${{ hashFiles('_typst/deep-learning-notes-zh.pdf') != '' }}
        uses: actions/upload-artifact@v7
        with:
          path: _typst/deep-learning-notes-zh.pdf
          archive: false

      - name: Upload zh PDF to GitHub Release
        if: ${{ github.event_name == 'release' && hashFiles('_typst/deep-learning-notes-zh.pdf') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            _typst/deep-learning-notes-zh.pdf \
            --clobber

  render-en-pdf:
    name: Typst PDF Rendering for English Notebooks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install PDF fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-jetbrains-mono
          fc-cache -fv
          fc-list | grep -i "JetBrains Mono" | head || true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Mermaid CLI
        run: |
          npm init -y
          npm install @mermaid-js/mermaid-cli

      - name: Set Chrome path for Puppeteer
        if: runner.os == 'Linux'
        run: echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable" >> "$GITHUB_ENV"

      - name: Convert en qmd to PDF
        shell: bash
        run: quarto render --profile typst-en

      - name: Generate en PDF attestation
        if: ${{ hashFiles('_typst/deep-learning-notes-en.pdf') != '' }}
        uses: actions/attest@v4
        with:
          subject-path: _typst/deep-learning-notes-en.pdf

      - name: Upload en artifact
        if: ${{ hashFiles('_typst/deep-learning-notes-en.pdf') != '' }}
        uses: actions/upload-artifact@v7
        with:
          path: _typst/deep-learning-notes-en.pdf
          archive: false

      - name: Upload en PDF to GitHub Release
        if: ${{ github.event_name == 'release' && hashFiles('_typst/deep-learning-notes-en.pdf') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            _typst/deep-learning-notes-en.pdf \
            --clobber
