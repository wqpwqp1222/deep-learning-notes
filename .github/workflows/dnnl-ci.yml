name: Test and Build dnnl Package

on:
  push:
    branches: [main]
    paths:
      - "dnnl/**"
      - ".github/workflows/dnnl-ci.yml"
  pull_request:
    paths:
      - "dnnl/**"
      - ".github/workflows/dnnl-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: dnnl-ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dnnl-test-build:
    name: Test and Build dnnl Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Format check with ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: format --check --diff
          src: >-
            dnnl/dnnl
            dnnl/tests

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: dnnl/pyproject.toml

      - name: Install dependencies
        run: |
          uv python install 3.14
          uv venv --python 3.14
          uv pip install "./dnnl[test]"

      - name: Test dnnl package
        run: uv run python -m pytest dnnl/tests

      - name: Build dnnl package
        run: uv build --python 3.14 --out-dir dist --clear ./dnnl

      - name: Generate package attestation
        uses: actions/attest@v4
        with:
          subject-path: "dist/*"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: dnnl-package-py314
          path: dist/*
          if-no-files-found: error
