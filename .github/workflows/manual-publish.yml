name: Manual Publish Quarto Website

on:
  workflow_dispatch:
    inputs:
      clear_freeze:
        description: "Clear _freeze before rendering?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      commit_back:
        description: "Commit _freeze and README changes back to the repository?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  DNNL_DATA_ROOT: ${{ github.workspace }}/datasets

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: manual-publish-website
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build and Deploy Quarto Website
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Remove freeze cache
        if: ${{ inputs.clear_freeze == 'true' }}
        shell: bash
        run: rm -rf _freeze

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            dnnl/pyproject.toml

      - name: Install dependencies
        run: |
          uv python install 3.14
          uv sync --python 3.14 --all-packages

      - name: Generate TOC for the website
        run: uv run python generate_toc.py

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Download Caltech101 from Google Drive
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$DNNL_DATA_ROOT/caltech101"
          cd "$DNNL_DATA_ROOT/caltech101"

          uv run gdown 19qo4t_YR0RGILU_nmpXHbo1mMGOvn3iH

      - name: Download datasets for notebooks
        run: uv run python utils/download_datasets.py

      - name: Render site
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: quarto render

      - name: Commit back rendered site
        if: ${{ inputs.commit_back == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add _freeze
          git add zh/README.md en/README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "MAINT: Update rendered deep-learning-notes website"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
