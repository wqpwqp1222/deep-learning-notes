name: Check Quarto Website Rendering

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "assets/**"
      - "_freeze/**"
      - "**/LICENSE.*"
      - "**/*.md"
      - "**/ruff.toml"
      - "**/.git*"
      - "**/.github/*.json"
      - "**/.github/workflows/dnnl-ci.yml"
      - "**/.github/workflows/manual-publish.yml"
      - "**/.github/workflows/package-notebooks.yml"
      - "**/.github/workflows/publish.yml"

env:
  DNNL_DATA_ROOT: ${{ github.workspace }}/datasets
  HF_HOME: ~/.cache/huggingface
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

permissions:
  contents: read

concurrency:
  group: check-rendering-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-check:
    name: Check Quarto Website Rendering
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Remove existing freeze cache
        run: rm -rf _freeze

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Detect external invalidation
        id: changes
        shell: bash
        run: |
          changed_files=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})

          echo "$changed_files"

          if echo "$changed_files" | grep -Eq '^(dnnl/|pyproject\.toml)'; then
            echo "external_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "external_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Quarto Freeze Cache
        if: steps.changes.outputs.external_changed != 'true'
        uses: actions/cache/restore@v5
        with:
          path: _freeze
          key: quarto-freeze-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            quarto-freeze-${{ runner.os }}-

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            dnnl/pyproject.toml

      - name: Install Python dependencies
        run: |
          uv python install 3.14
          uv sync --python 3.14 --all-packages

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Set Chrome path for Puppeteer
        if: runner.os == 'Linux'
        run: echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable" >> "$GITHUB_ENV"

      - name: Download datasets for notebooks
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$DNNL_DATA_ROOT/caltech101"
          uv run gdown 19qo4t_YR0RGILU_nmpXHbo1mMGOvn3iH \
            -O "$DNNL_DATA_ROOT/caltech101/caltech-101.zip"

          mkdir -p "$DNNL_DATA_ROOT/MNIST"
          uv run gdown 1Aph8a8r7_uFN-IsVu5oFmZ4_zJKckk4X \
            -O "$DNNL_DATA_ROOT/MNIST/mnist.zip"
          unzip -q "$DNNL_DATA_ROOT/MNIST/mnist.zip" -d "$DNNL_DATA_ROOT/MNIST"

          uv run python utils/download_datasets.py

      - name: Render site
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: quarto render
