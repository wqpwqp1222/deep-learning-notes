project:
  type: book
  output-dir: "_typst/en"
  render:
    - "*.qmd"
  pre-render:
    - "utils/render_mermaid.py"
  post-render:
    - "utils/clean_mermaid_svg.py"
    - "utils/rename_pdf.py"

execute:
  enabled: false

format:
  typst:
    lang: en
    toc: true
    toc-depth: 2
    wrap: none
    engine: jupyter
    code-annotations: below
    include-before-body:
      - "utils/typst-header-en.typ"

book:
  chapters:
    - index.qmd
    - part: "Chapter 1: Introduction to Deep Learning"
      chapters:
        - "en/ch1-introduction/ch1.1-neural-network.qmd"
        - "en/ch1-introduction/ch1.3-computation-graph.qmd"
    - part: "Chapter 2: Getting Started with PyTorch"
      chapters:
        - "en/ch2-pytorch-introduction/ch2.1-automatic-differentiation.qmd"
        - "en/ch2-pytorch-introduction/ch2.2-autograd-contexts.qmd"
        - "en/ch2-pytorch-introduction/ch2.3-dataset-and-dataloader.qmd"
        - "en/ch2-pytorch-introduction/ch2.4-nn-module.qmd"
        - "en/ch2-pytorch-introduction/ch2.5-optimizer.qmd"
        - "en/ch2-pytorch-introduction/ch2.6-training-loop.qmd"
        - "en/ch2-pytorch-introduction/ch2.7-checkpoint-resuming.qmd"
    - part: "Chapter 3: Multi-Layer Perceptron: From Single Layer to Deep Nonlinear Modeling"
      chapters:
        - "en/ch3-multi-layer-perceptron/ch3.1-from-linear-model-to-mlp.qmd"
        - "en/ch3-multi-layer-perceptron/ch3.2-activation-functions.qmd"
        - "en/ch3-multi-layer-perceptron/ch3.3-softmax-cross-entropy.qmd"
        - "en/ch3-multi-layer-perceptron/ch3.4-linear-layer.qmd"
        - "en/ch3-multi-layer-perceptron/ch3.5-mlp-from-scratch.qmd"
        - "en/ch3-multi-layer-perceptron/ch3.6-train-mlp-on-mnist.qmd"
        - "en/ch3-multi-layer-perceptron/ch3.7-gradient-checking.qmd"
        - "en/ch3-multi-layer-perceptron/ch3.8-mlp-with-pytorch.qmd"
    - part: "Chapter 4: Optimization Algorithms: How Neural Networks Update Parameters"
      chapters:
        - "en/ch4-optimization-algorithms/ch4.1-gradient-descent.qmd"
        - "en/ch4-optimization-algorithms/ch4.2-momentum-nesterov.qmd"
        - "en/ch4-optimization-algorithms/ch4.3-adagrad.qmd"
        - "en/ch4-optimization-algorithms/ch4.4-rmsprop-adadelta.qmd"
        - "en/ch4-optimization-algorithms/ch4.5-adam.qmd"
        - "en/ch4-optimization-algorithms/ch4.6-adamw.qmd"
        - "en/ch4-optimization-algorithms/ch4.7-muon.qmd"
        - "en/ch4-optimization-algorithms/ch4.8-optimizer-practice.qmd"
        - "en/ch4-optimization-algorithms/ch4.9-learning-rate-schedulers.qmd"
    - part: "Chapter 8: Attention and Transformer: From Dynamic Retrieval to Sequence Modeling"
      chapters:
        - "en/ch8-attention-and-transformer/ch8.1-bahdanau-attention.qmd"
        - "en/ch8-attention-and-transformer/ch8.2-cross-attention.qmd"
        - "en/ch8-attention-and-transformer/ch8.3-self-attention.qmd"
        - "en/ch8-attention-and-transformer/ch8.4-multi-head-attention.qmd"
        - "en/ch8-attention-and-transformer/ch8.5-positional-encoding.qmd"
        - "en/ch8-attention-and-transformer/ch8.6-transformer-encoder.qmd"
        - "en/ch8-attention-and-transformer/ch8.7-transformer-decoder.qmd"
        - "en/ch8-attention-and-transformer/ch8.8-encoder-decoder-transformer.qmd"
