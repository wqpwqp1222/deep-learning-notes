        - "en/ch8-attention-and-transformer/ch8.10-transformer-architectures.qmd"
        - "en/ch8-attention-and-transformer/ch8.11-hugging-face-transformers-api.qmd"
    - part: "Chapter 10: Efficient Attention Implementations: From Memory-Efficient Attention to FlashAttention"
      chapters:
