project:
  type: book
  output-dir: "_typst/zh"
  render:
    - "*.qmd"
  pre-render:
    - "utils/render_mermaid.py"
  post-render:
    - "utils/clean_mermaid_svg.py"
    - "utils/rename_pdf.py"

execute:
  enabled: false

format:
  typst:
    lang: en
    toc: true
    toc-depth: 2
    toc-indent: 0em
    wrap: none
    engine: jupyter
    # TODO: Remove this when Quarto supports Typst 0.15
    keep-typ: true
    papersize: a4
    fig-cap-location: bottom
    tbl-cap-location: top
    code-annotations: below
    citeproc: true
    bibliographystyle: ieee
    citation-location: document
    syntax-highlighting: idiomatic
    include-before-body:
      - "utils/typst-header-zh.typ"

book:
  chapters:
    - index.qmd
    - part: "Chapter 1: 深度学习简介"
      chapters:
        - "zh/ch1-introduction/ch1.1-neural-network.qmd"
        - "zh/ch1-introduction/ch1.3-computation-graph.qmd"
    - part: "Chapter 2: PyTorch 入门"
      chapters:
        - "zh/ch2-pytorch-introduction/ch2.1-automatic-differentiation.qmd"
        - "zh/ch2-pytorch-introduction/ch2.2-autograd-contexts.qmd"
        - "zh/ch2-pytorch-introduction/ch2.3-dataset-and-dataloader.qmd"
        - "zh/ch2-pytorch-introduction/ch2.4-nn-module.qmd"
        - "zh/ch2-pytorch-introduction/ch2.5-optimizer.qmd"
        - "zh/ch2-pytorch-introduction/ch2.6-training-loop.qmd"
        - "zh/ch2-pytorch-introduction/ch2.7-checkpoint-resuming.qmd"
    - part: "Chapter 3: 多层感知机：从单层到深层的非线性建模"
      chapters:
        - "zh/ch3-multi-layer-perceptron/ch3.1-from-linear-model-to-mlp.qmd"
        - "zh/ch3-multi-layer-perceptron/ch3.2-activation-functions.qmd"
        - "zh/ch3-multi-layer-perceptron/ch3.3-softmax-cross-entropy.qmd"
        - "zh/ch3-multi-layer-perceptron/ch3.4-linear-layer.qmd"
        - "zh/ch3-multi-layer-perceptron/ch3.5-mlp-from-scratch.qmd"
        - "zh/ch3-multi-layer-perceptron/ch3.6-train-mlp-on-mnist.qmd"
        - "zh/ch3-multi-layer-perceptron/ch3.7-gradient-checking.qmd"
        - "zh/ch3-multi-layer-perceptron/ch3.8-mlp-with-pytorch.qmd"
    - part: "Chapter 4: 优化算法：神经网络如何更新参数"
      chapters:
